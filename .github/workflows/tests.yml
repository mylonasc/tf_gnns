name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  keras-backend-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run backend smoke tests (Keras TF backend)
        env:
          KERAS_BACKEND: tensorflow
        run: uv run pytest -q tests/test_backend_ops.py

  keras-torch-backend-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        torch-version: ["2.10.0", "2.11.0", "2.12.0"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Create virtual environment
        run: uv venv

      - name: Install project test dependencies
        run: uv pip install --python .venv/bin/python -e . pytest pytest-cov

      - name: Install Torch ${{ matrix.torch-version }} CPU wheel
        run: >-
          uv pip install --python .venv/bin/python
          --index-url https://download.pytorch.org/whl/cpu
          "torch==${{ matrix.torch-version }}"

      - name: Run backend smoke tests (Keras Torch backend, Torch ${{ matrix.torch-version }})
        env:
          KERAS_BACKEND: torch
        run: >-
          uv run --no-sync pytest -q
          tests/test_backend_ops.py
          tests/test_torch_backend_runtime.py
          tests/test_notebook_torch_backend_flow.py

  lint-docstrings:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run non-blocking docstring lint
        run: scripts/run_docstring_lint.sh

  docs-build:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run non-blocking docs build
        run: scripts/run_docs_build.sh

  test-tf217:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests (TensorFlow 2.17)
        run: scripts/run_tf_matrix_tests.sh 2.17

  test-tf218:
